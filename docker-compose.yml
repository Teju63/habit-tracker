# ============================================================
# docker-compose.yml — Smart Habit Streak Tracker
# Team Vate | Full Stack + DevOps Stack
#
# Run: docker-compose up --build
# Stop: docker-compose down
# ============================================================

networks:
  habit-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:

services:

  # ─────────────────────────────
  # 🌐 Frontend (Nginx)
  # ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: habit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - habit-net
    restart: unless-stopped
    labels:
      - "project=smart-habit-tracker"
      - "component=frontend"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────
  # 🔧 Backend (Node.js API)
  # ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: habit-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ALLOWED_ORIGIN=http://localhost
    networks:
      - habit-net
    restart: unless-stopped
    labels:
      - "project=smart-habit-tracker"
      - "component=backend"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────
  # 📊 Prometheus (Metrics)
  # ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: habit-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - habit-net
    restart: unless-stopped
    depends_on:
      - backend

  # ─────────────────────────────
  # 📈 Grafana (Dashboards)
  # ─────────────────────────────
  grafana:
    image: grafana/grafana:10.2.2
    container_name: habit-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=vate2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - habit-net
    restart: unless-stopped
    depends_on:
      - prometheus
