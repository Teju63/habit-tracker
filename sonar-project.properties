# sonar-project.properties — SonarQube Configuration
# Team Vate | Smart Habit Streak Tracker

sonar.projectKey=vate-smart-habit-tracker
sonar.projectName=Smart Habit Streak Tracker
sonar.projectVersion=1.0.0
sonar.organization=vate-team

# Source & test paths
sonar.sources=backend,frontend/src
sonar.tests=backend/tests
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.min.js

# Language
sonar.language=js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Quality gates
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8

# Extra info
sonar.links.homepage=https://github.com/vate-team/smart-habit-tracker
sonar.links.ci=https://github.com/vate-team/smart-habit-tracker/actions
